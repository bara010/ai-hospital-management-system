# ══════════════════════════════════════════════════════════════════════════════
# MediPulse - Oracle Database Configuration
# ══════════════════════════════════════════════════════════════════════════════

# ── Oracle Database ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/MEDIPULSE
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=medipulse_user
spring.datasource.password=MediPulse@2024

# ── Connection Pool (HikariCP) ────────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=MediPulseHikariPool

# ── JPA / Hibernate (Oracle) ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false

# ── Oracle Sequence ID generation ─────────────────────────────────────────────
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.id.optimizer.pooled.prefer_lo=true

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=MediPulseHospitalManagementSystemSecretKey2024VeryLongSecretKeyForJWT
jwt.expiration=86400000

# ── AI Service ────────────────────────────────────────────────────────────────
ai.service.url=http://localhost:5001

# ── Scheduling ────────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=5

# ── Google Authenticator TOTP ─────────────────────────────────────────────────
# No configuration needed — secrets are generated per-user and stored in DB.
# Users scan a QR code with Google Authenticator on first registration/login.
totp.issuer=MediPulse
totp.period=30
totp.digits=6

# ── App ───────────────────────────────────────────────────────────────────────
spring.application.name=MediPulse
