spring:
  application:
    name: hospito-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hospito}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

server:
  port: ${SERVER_PORT:8080}

hospito:
  jwt:
    secret: ${JWT_SECRET:replace-with-a-very-long-64-byte-secret-key-value}
    expiration-minutes: ${JWT_EXP_MINUTES:120}
    login-challenge-expiration-minutes: ${JWT_LOGIN_EXP_MINUTES:5}
  totp:
    issuer: HOSPITO
  upload:
    dir: ${UPLOAD_DIR:uploads}
  email:
    enabled: ${EMAIL_ENABLED:false}
    from: ${EMAIL_FROM:no-reply@hospito.local}
  medication-reminder:
    interval-ms: ${MEDICATION_REMINDER_INTERVAL_MS:300000}
    cooldown-minutes: ${MEDICATION_REMINDER_COOLDOWN_MINUTES:45}

fcm:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT:}

logging:
  level:
    root: WARN
    org.springframework: WARN
    com.hospito: INFO

